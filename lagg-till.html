<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lägg till – Min App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="lagg-till.css" />
</head>
<body>

  <div class="container wide">

    <div class="header">
      <a href="index.html" class="back-btn">← Tillbaka</a>
      <h1>Lägg till ord</h1>
      <p>Fyll i ett nytt ord och dess förklaringar</p>
    </div>

    <div class="form-card">

      <div class="form-group">
        <label for="input-ord">Ord</label>
        <input type="text" id="input-ord" placeholder="T.ex. Ephemeral" />
      </div>

      <div class="form-group">
        <label for="input-min">Min förklaring</label>
        <textarea id="input-min" placeholder="Skriv din egna förklaring..."></textarea>
      </div>

      <div class="form-group">
        <label for="input-sa">Svenska Akademin</label>
        <textarea id="input-sa" placeholder="Skriv Svenska Akademins förklaring..."></textarea>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="läggTillOrd()">
        Lägg till ord
      </button>

      <div id="meddelande" class="meddelande"></div>

    </div>

  </div>

  <script src="config.js"></script>
  <script src="lagg-till.js"></script>

</body>
</html>
